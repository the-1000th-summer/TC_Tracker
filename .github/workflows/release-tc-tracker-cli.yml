name: Release TC_Tracker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  actions: read
  contents: write

env:
  CLI_SOURCE_DIR: code/projects/TC_Tracker_CLI
  GUI_SOURCE_DIR: code/projects/TC_Tracker
  GUI_SOLUTION_PATH: code/projects/TC_Tracker/TC_Tracker.sln
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build/tc-tracker-cli
      INSTALL_DIR: ${{ github.workspace }}/dist/TC_Tracker_CLI
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Prepare Windows vcpkg
        uses: ./.github/actions/prepare-windows-vcpkg
        with:
          source-dir: ${{ env.CLI_SOURCE_DIR }}
          build-dir: ${{ env.BUILD_DIR }}
          vcpkg-root: ${{ env.VCPKG_ROOT }}
          cache-dir: ${{ github.workspace }}/vcpkg-cache
          triplet: ${{ env.VCPKG_DEFAULT_TRIPLET }}

      - name: Build
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR" --config Release --target TC_Tracker_CLI --parallel

      - name: Install and collect runtime files
        shell: pwsh
        run: |
          cmake --install "$env:BUILD_DIR" --config Release --prefix "$env:INSTALL_DIR"

          $runtimeDir = Join-Path "$env:BUILD_DIR" "Release"
          if (Test-Path $runtimeDir) {
            Copy-Item "$runtimeDir/*.dll" "$env:INSTALL_DIR" -Force -ErrorAction SilentlyContinue
          }

          $rootDlls = Get-ChildItem "$env:BUILD_DIR" -Filter "*.dll" -File -ErrorAction SilentlyContinue
          if ($rootDlls) {
            Copy-Item $rootDlls.FullName "$env:INSTALL_DIR" -Force
          }

          Get-ChildItem "$env:INSTALL_DIR" -Recurse

      - name: Create release archive
        id: package
        shell: pwsh
        run: |
          $assetName = "TC_Tracker_CLI-$env:RELEASE_TAG-windows-x64.zip"
          $assetPath = Join-Path "$env:RUNNER_TEMP" $assetName
          Compress-Archive -Path "$env:INSTALL_DIR/*" -DestinationPath $assetPath -Force
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload Windows archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-cli-windows-x64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64
    runs-on: macos-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build/tc-tracker-cli
      INSTALL_DIR: ${{ github.workspace }}/dist/TC_Tracker_CLI
      HOMEBREW_NO_INSTALL_CLEANUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja pkg-config boost protobuf netcdf netcdf-cxx libomp nlohmann-json

      - name: Configure CMake
        run: |
          BREW_PREFIX="$(brew --prefix)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"

          cmake \
            -S "$CLI_SOURCE_DIR" \
            -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX;$LIBOMP_PREFIX" \
            -DOpenMP_ROOT="$LIBOMP_PREFIX" \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$LIBOMP_PREFIX/include" \
            -DOpenMP_CXX_LIB_NAMES=omp \
            -DOpenMP_omp_LIBRARY="$LIBOMP_PREFIX/lib/libomp.dylib"

      - name: Build
        run: cmake --build "$BUILD_DIR" --target TC_Tracker_CLI --parallel

      - name: Install
        run: |
          cmake --install "$BUILD_DIR" --prefix "$INSTALL_DIR"
          find "$INSTALL_DIR" -maxdepth 3 -type f -print

      - name: Create release archive
        id: package
        run: |
          asset_name="TC_Tracker_CLI-$RELEASE_TAG-macos-arm64.tar.gz"
          asset_path="$RUNNER_TEMP/$asset_name"
          tar -czf "$asset_path" -C "$INSTALL_DIR" .
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload macOS archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-cli-macos-arm64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  build-gui-windows:
    name: Build GUI Windows x64
    runs-on: windows-latest
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/dist/TC_Tracker
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_CACHE_DIR: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
      MSBUILD_PLATFORM_TOOLSET: v143

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Prepare Windows vcpkg
        id: prepare-vcpkg
        uses: ./.github/actions/prepare-windows-vcpkg
        with:
          source-dir: ${{ env.GUI_SOURCE_DIR }}
          vcpkg-root: ${{ env.VCPKG_ROOT }}
          cache-dir: ${{ env.VCPKG_CACHE_DIR }}
          triplet: ${{ env.VCPKG_DEFAULT_TRIPLET }}
          configure-cmake: "false"
          integrate-msbuild: "true"
          save-cache: "false"

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore "$env:GUI_SOLUTION_PATH" -PackagesDirectory "$env:GUI_SOURCE_DIR/packages"

      - name: Build solution
        shell: pwsh
        run: |
          $manifestRoot = (Resolve-Path "$env:GUI_SOURCE_DIR").Path
          $vcpkgRoot = (Resolve-Path "$env:VCPKG_ROOT").Path

          msbuild "$env:GUI_SOLUTION_PATH" `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset="$env:MSBUILD_PLATFORM_TOOLSET" `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgManifestRoot="$manifestRoot" `
            /p:VcpkgRoot="$vcpkgRoot\" `
            /p:VcpkgTriplet="$env:VCPKG_DEFAULT_TRIPLET"

      - name: Save vcpkg binary cache
        if: steps.prepare-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ env.VCPKG_CACHE_DIR }}
          key: ${{ steps.prepare-vcpkg.outputs.cache-primary-key }}

      - name: Collect build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:ARTIFACT_DIR" | Out-Null
          Copy-Item "$env:GUI_SOURCE_DIR/TC_Tracker/bin/x64/Release/*" "$env:ARTIFACT_DIR" -Recurse -Force
          Get-ChildItem "$env:ARTIFACT_DIR" -Recurse

      - name: Create release archive
        id: package
        shell: pwsh
        run: |
          $assetName = "TC_Tracker-$env:RELEASE_TAG-windows-x64.zip"
          $assetPath = Join-Path "$env:RUNNER_TEMP" $assetName
          Compress-Archive -Path "$env:ARTIFACT_DIR/*" -DestinationPath $assetPath -Force
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload GUI Windows archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-gui-windows-x64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-gui-windows

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: tc-tracker-*
          path: release-assets
          merge-multiple: true

      - name: List release archives
        run: find release-assets -maxdepth 1 -type f -print

      - name: Upload archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: TC_Tracker ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
