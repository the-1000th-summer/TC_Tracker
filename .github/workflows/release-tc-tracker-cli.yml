name: Release TC_Tracker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  actions: read
  contents: write

env:
  CLI_SOURCE_DIR: code/projects/TC_Tracker_CLI
  GUI_SOURCE_DIR: code/projects/TC_Tracker
  GUI_SOLUTION_PATH: code/projects/TC_Tracker/TC_Tracker.sln
  MAC_GUI_SOURCE_DIR: code/projects/TC_Tracker_mac
  MAC_GUI_PROJECT_PATH: code/projects/TC_Tracker_mac/TC_Tracker_mac.xcodeproj
  MAC_GUI_SCHEME: TC_Tracker_mac
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build/tc-tracker-cli
      INSTALL_DIR: ${{ github.workspace }}/dist/TC_Tracker_CLI
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Prepare Windows vcpkg
        uses: ./.github/actions/prepare-windows-vcpkg
        with:
          source-dir: ${{ env.CLI_SOURCE_DIR }}
          build-dir: ${{ env.BUILD_DIR }}
          vcpkg-root: ${{ env.VCPKG_ROOT }}
          cache-dir: ${{ github.workspace }}/vcpkg-cache
          triplet: ${{ env.VCPKG_DEFAULT_TRIPLET }}

      - name: Build
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR" --config Release --target TC_Tracker_CLI --parallel

      - name: Install and collect runtime files
        shell: pwsh
        run: |
          cmake --install "$env:BUILD_DIR" --config Release --prefix "$env:INSTALL_DIR"

          $runtimeDir = Join-Path "$env:BUILD_DIR" "Release"
          if (Test-Path $runtimeDir) {
            Copy-Item "$runtimeDir/*.dll" "$env:INSTALL_DIR" -Force -ErrorAction SilentlyContinue
          }

          $rootDlls = Get-ChildItem "$env:BUILD_DIR" -Filter "*.dll" -File -ErrorAction SilentlyContinue
          if ($rootDlls) {
            Copy-Item $rootDlls.FullName "$env:INSTALL_DIR" -Force
          }

          Get-ChildItem "$env:INSTALL_DIR" -Recurse

      - name: Create release archive
        id: package
        shell: pwsh
        run: |
          $assetBaseName = "TC_Tracker_CLI-$env:RELEASE_TAG-windows-x64"
          $assetName = "$assetBaseName.zip"
          $assetPath = Join-Path "$env:RUNNER_TEMP" $assetName
          $packageDir = Join-Path "$env:RUNNER_TEMP" $assetBaseName
          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force $packageDir | Out-Null
          Copy-Item "$env:INSTALL_DIR/*" $packageDir -Recurse -Force
          Compress-Archive -Path $packageDir -DestinationPath $assetPath -Force
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload Windows archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-cli-windows-x64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64
    runs-on: macos-15
    env:
      BUILD_DIR: ${{ github.workspace }}/build/tc-tracker-cli
      INSTALL_DIR: ${{ github.workspace }}/dist/TC_Tracker_CLI
      HOMEBREW_NO_INSTALL_CLEANUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja pkg-config boost protobuf netcdf netcdf-cxx libomp nlohmann-json cxxopts

      - name: Configure CMake
        run: |
          BREW_PREFIX="$(brew --prefix)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"

          cmake \
            -S "$CLI_SOURCE_DIR" \
            -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="$BREW_PREFIX;$LIBOMP_PREFIX" \
            -DOpenMP_ROOT="$LIBOMP_PREFIX" \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$LIBOMP_PREFIX/include" \
            -DOpenMP_CXX_LIB_NAMES=omp \
            -DOpenMP_omp_LIBRARY="$LIBOMP_PREFIX/lib/libomp.dylib"

      - name: Build
        run: cmake --build "$BUILD_DIR" --target TC_Tracker_CLI --parallel

      - name: Install
        run: |
          cmake --install "$BUILD_DIR" --prefix "$INSTALL_DIR"
          find "$INSTALL_DIR" -maxdepth 3 -type f -print

      - name: Create release archive
        id: package
        run: |
          asset_name="TC_Tracker_CLI-$RELEASE_TAG-macos-arm64.tar.gz"
          asset_path="$RUNNER_TEMP/$asset_name"
          tar -czf "$asset_path" -C "$INSTALL_DIR" .
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload macOS archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-cli-macos-arm64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build/tc-tracker-cli
      INSTALL_DIR: ${{ github.workspace }}/dist/TC_Tracker_CLI

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            patchelf \
            pkg-config \
            libboost-dev \
            libboost-filesystem-dev \
            libboost-serialization-dev \
            libnetcdf-dev \
            libnetcdf-c++4-dev \
            libprotobuf-dev \
            protobuf-compiler \
            nlohmann-json3-dev \
            libcxxopts-dev

      - name: Configure CMake
        run: |
          cmake \
            -S "$CLI_SOURCE_DIR" \
            -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build "$BUILD_DIR" --target TC_Tracker_CLI --parallel

      - name: Install
        run: |
          cmake --install "$BUILD_DIR" --prefix "$INSTALL_DIR"
          find "$INSTALL_DIR" -maxdepth 3 -type f -print

      - name: Bundle Linux shared libraries
        run: |
          set -euo pipefail

          executable="$INSTALL_DIR/TC_Tracker_CLI"
          lib_dir="$INSTALL_DIR/lib"
          mkdir -p "$lib_dir"

          should_bundle_library() {
            local library_name
            library_name="$(basename "$1")"

            case "$library_name" in
              libboost_filesystem.so.*|libboost_serialization.so.*|libnetcdf.so.*|libnetcdf_c++4.so.*|libhdf5*.so.*|libprotobuf*.so.*|libabsl_*.so.*|libutf8_range*.so.*|libgomp.so.*|libaec.so.*|libsz.so.*)
                return 0
                ;;
            esac

            return 1
          }

          list_dependencies() {
            ldd "$1" | awk '
              /=> \// { print $1 "|" $3 }
              /^[[:space:]]*\// {
                name = $1
                sub(".*/", "", name)
                print name "|" $1
              }
            '
          }

          pending=("$executable")
          processed="|"

          while [ "${#pending[@]}" -gt 0 ]; do
            binary="${pending[0]}"
            pending=("${pending[@]:1}")

            case "$processed" in
              *"|$binary|"*) continue ;;
            esac
            processed="$processed$binary|"

            while IFS= read -r dependency_entry; do
              [ -n "$dependency_entry" ] || continue

              dependency_name="${dependency_entry%%|*}"
              dependency="${dependency_entry#*|}"
              should_bundle_library "$dependency" || continue

              bundled_dependency="$lib_dir/$dependency_name"

              if [ ! -e "$bundled_dependency" ]; then
                cp -L "$dependency" "$bundled_dependency"
                chmod u+w "$bundled_dependency"
              fi

              pending+=("$bundled_dependency")
            done < <(list_dependencies "$binary")
          done

          patchelf --set-rpath '$ORIGIN/lib' "$executable"

          for library in "$lib_dir"/*.so*; do
            [ -e "$library" ] || continue
            patchelf --set-rpath '$ORIGIN' "$library" || true
          done

          echo "Bundled Linux shared libraries:"
          find "$lib_dir" -maxdepth 1 -type f -printf '%f\n' | sort

          echo "Resolved executable dependencies:"
          ldd "$executable"

      - name: Create release archive
        id: package
        run: |
          asset_base_name="TC_Tracker_CLI-$RELEASE_TAG-linux-x64"
          asset_name="$asset_base_name.tar.gz"
          asset_path="$RUNNER_TEMP/$asset_name"
          package_dir="$RUNNER_TEMP/$asset_base_name"
          rm -rf "$package_dir"
          mkdir -p "$package_dir"
          cp -a "$INSTALL_DIR"/. "$package_dir"/
          tar -czf "$asset_path" -C "$RUNNER_TEMP" "$asset_base_name"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload Linux archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-cli-linux-x64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  build-gui-windows:
    name: Build GUI Windows x64
    runs-on: windows-latest
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/dist/TC_Tracker
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_CACHE_DIR: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
      MSBUILD_PLATFORM_TOOLSET: v143

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Prepare Windows vcpkg
        id: prepare-vcpkg
        uses: ./.github/actions/prepare-windows-vcpkg
        with:
          source-dir: ${{ env.GUI_SOURCE_DIR }}
          vcpkg-root: ${{ env.VCPKG_ROOT }}
          cache-dir: ${{ env.VCPKG_CACHE_DIR }}
          triplet: ${{ env.VCPKG_DEFAULT_TRIPLET }}
          configure-cmake: "false"
          integrate-msbuild: "true"
          save-cache: "false"

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore "$env:GUI_SOLUTION_PATH" -PackagesDirectory "$env:GUI_SOURCE_DIR/packages"

      - name: Build solution
        shell: pwsh
        run: |
          $manifestRoot = (Resolve-Path "$env:GUI_SOURCE_DIR").Path
          $vcpkgRoot = (Resolve-Path "$env:VCPKG_ROOT").Path

          msbuild "$env:GUI_SOLUTION_PATH" `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PlatformToolset="$env:MSBUILD_PLATFORM_TOOLSET" `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgManifestRoot="$manifestRoot" `
            /p:VcpkgRoot="$vcpkgRoot\" `
            /p:VcpkgTriplet="$env:VCPKG_DEFAULT_TRIPLET"

      - name: Save vcpkg binary cache
        if: steps.prepare-vcpkg.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ env.VCPKG_CACHE_DIR }}
          key: ${{ steps.prepare-vcpkg.outputs.cache-primary-key }}

      - name: Collect build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:ARTIFACT_DIR" | Out-Null
          Copy-Item "$env:GUI_SOURCE_DIR/TC_Tracker/bin/x64/Release/*" "$env:ARTIFACT_DIR" -Recurse -Force
          Get-ChildItem "$env:ARTIFACT_DIR" -Recurse

      - name: Create release archive
        id: package
        shell: pwsh
        run: |
          $assetName = "TC_Tracker-$env:RELEASE_TAG-windows-x64.zip"
          $assetPath = Join-Path "$env:RUNNER_TEMP" $assetName
          Compress-Archive -Path "$env:ARTIFACT_DIR/*" -DestinationPath $assetPath -Force
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload GUI Windows archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-gui-windows-x64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  build-gui-macos:
    name: Build GUI macOS arm64
    runs-on: macos-15
    env:
      DERIVED_DATA_DIR: ${{ github.workspace }}/build/tc-tracker-mac-derived-data
      ARCHIVE_PATH: ${{ github.workspace }}/build/TC_Tracker_mac.xcarchive
      ARTIFACT_DIR: ${{ github.workspace }}/dist/TC_Tracker_mac
      HOMEBREW_NO_INSTALL_CLEANUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: brew install boost protobuf abseil netcdf netcdf-cxx libomp nlohmann-json

      - name: Build app
        run: |
          xcodebuild clean archive \
            -project "$MAC_GUI_PROJECT_PATH" \
            -scheme "$MAC_GUI_SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_DIR" \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      - name: Collect app bundle
        id: collect
        run: |
          app_path="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -type d -name "*.app" -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found in archive products." >&2
            exit 1
          fi

          mkdir -p "$ARTIFACT_DIR"
          ditto "$app_path" "$ARTIFACT_DIR/$(basename "$app_path")"
          echo "app_path=$ARTIFACT_DIR/$(basename "$app_path")" >> "$GITHUB_OUTPUT"
          echo "app_name=$(basename "$app_path")" >> "$GITHUB_OUTPUT"

      - name: Bundle Homebrew dylibs and sign app
        run: |
          set -euo pipefail

          app_path="${{ steps.collect.outputs.app_path }}"
          executable="$app_path/Contents/MacOS/$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$app_path/Contents/Info.plist")"
          frameworks_dir="$app_path/Contents/Frameworks"
          brew_prefix="$(brew --prefix)"
          mkdir -p "$frameworks_dir"

          should_bundle_dylib() {
            case "$1" in
              /opt/homebrew/*|/usr/local/*|@rpath/*|@loader_path/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          resolve_dylib_path() {
            local dep="$1"
            local dep_name
            dep_name="$(basename "$dep")"

            if [ -e "$dep" ]; then
              echo "$dep"
              return 0
            fi

            for candidate in \
              "$brew_prefix/lib/$dep_name" \
              "$brew_prefix"/opt/*/lib/"$dep_name" \
              /usr/local/lib/"$dep_name" \
              /usr/local/opt/*/lib/"$dep_name"; do
              if [ -e "$candidate" ]; then
                echo "$candidate"
                return 0
              fi
            done

            return 1
          }

          copy_dylib() {
            local dep="$1"
            local resolved_dep
            local dep_name

            resolved_dep="$(resolve_dylib_path "$dep")"
            dep_name="$(basename "$dep")"

            if [ ! -e "$frameworks_dir/$dep_name" ]; then
              cp -L "$resolved_dep" "$frameworks_dir/$dep_name"
              chmod u+w "$frameworks_dir/$dep_name"
            fi

            pending+=("$frameworks_dir/$dep_name")
          }

          rewrite_dependencies() {
            local binary="$1"
            while IFS= read -r dep; do
              if should_bundle_dylib "$dep"; then
                copy_dylib "$dep"
                install_name_tool -change "$dep" "@executable_path/../Frameworks/$(basename "$dep")" "$binary"
              fi
            done < <(otool -L "$binary" | awk 'NR > 1 { print $1 }')
          }

          pending=("$executable")
          processed=""
          while [ "${#pending[@]}" -gt 0 ]; do
            binary="${pending[0]}"
            pending=("${pending[@]:1}")

            case "$processed" in
              *"|$binary|"*) continue ;;
            esac
            processed="$processed|$binary|"

            rewrite_dependencies "$binary"
          done

          for dylib in "$frameworks_dir"/*.dylib; do
            [ -e "$dylib" ] || continue
            install_name_tool -id "@executable_path/../Frameworks/$(basename "$dylib")" "$dylib"
          done

          find "$frameworks_dir" -type f -name "*.dylib" -print0 | xargs -0 -I {} codesign --force --sign "-" --timestamp=none {}
          codesign --force --deep --sign "-" --timestamp=none "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

          find "$ARTIFACT_DIR" -maxdepth 4 -print

      - name: Create release archive
        id: package
        run: |
          asset_name="TC_Tracker-$RELEASE_TAG-macos-arm64.zip"
          asset_path="$RUNNER_TEMP/$asset_name"
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.collect.outputs.app_path }}" "$asset_path"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload GUI macOS archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: tc-tracker-gui-macos-arm64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux
      - build-gui-windows
      - build-gui-macos

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: tc-tracker-*
          path: release-assets
          merge-multiple: true

      - name: List release archives
        run: find release-assets -maxdepth 1 -type f -print

      - name: Upload archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: TC_Tracker ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
