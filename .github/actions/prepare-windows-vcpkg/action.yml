name: Prepare Windows vcpkg
description: Restore, populate, and save the Windows vcpkg binary cache for the CLI build.

inputs:
  source-dir:
    description: CMake source directory.
    required: true
  build-dir:
    description: CMake build directory.
    required: true
  vcpkg-root:
    description: Directory where vcpkg will be cloned.
    required: true
  cache-dir:
    description: Directory used as the vcpkg file binary cache.
    required: true
  triplet:
    description: vcpkg triplet.
    required: true

runs:
  using: composite
  steps:
    - name: Restore vcpkg binary cache
      id: restore-vcpkg-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.cache-dir }}
        key: vcpkg-${{ runner.os }}-${{ inputs.triplet }}-${{ hashFiles('code/projects/TC_Tracker_CLI/vcpkg.json', 'code/projects/TC_Tracker_CLI/vcpkg-configuration.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-${{ inputs.triplet }}-

    - name: Bootstrap vcpkg
      shell: pwsh
      env:
        VCPKG_ROOT: ${{ inputs.vcpkg-root }}
      run: |
        git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
        & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics

    - name: Configure CMake
      shell: pwsh
      env:
        SOURCE_DIR: ${{ inputs.source-dir }}
        BUILD_DIR: ${{ inputs.build-dir }}
        VCPKG_ROOT: ${{ inputs.vcpkg-root }}
        CACHE_DIR: ${{ inputs.cache-dir }}
        VCPKG_BINARY_SOURCES: clear;files,${{ inputs.cache-dir }},readwrite
      run: |
        New-Item -ItemType Directory -Force "$env:CACHE_DIR" | Out-Null

        cmake `
          -S "$env:SOURCE_DIR" `
          -B "$env:BUILD_DIR" `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Save vcpkg binary cache
      if: steps.restore-vcpkg-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      continue-on-error: true
      with:
        path: ${{ inputs.cache-dir }}
        key: ${{ steps.restore-vcpkg-cache.outputs.cache-primary-key }}
