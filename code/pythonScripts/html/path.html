    <style>
        .graticule {
          fill: none;
          stroke: #777;
          stroke-opacity: .5;
          stroke-width: .5px;
        }
        .land {
          fill: #999;
        }
        .boundary {
          fill: none;
          stroke: #fff;
          stroke-width: .5px;
        }
        svg .path {
          fill: none;
          stroke-opacity: .8;
          stroke-dasharray: 3,2;
          stroke: #f44;
        }
        .points {
            visibility: visible;
            fill: #f44;
            r: 5;
        }
        .points:hover {
            visibility: visible;
            fill: #f44;
            r: 8;
        }
        .texts {
            visibility: hidden;
        }
        .texts:hover {
            visibility: visible;
        }
    </style>

            .attr("d", path);
